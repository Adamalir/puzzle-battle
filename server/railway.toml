# Railway deployment configuration for the Puzzle Battle backend.
# Set "Root Directory" to "server/" in the Railway service settings.

[build]
builder = "NIXPACKS"
# 1. Install deps  2. Generate Prisma client  3. Compile TypeScript
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
# Push schema to the database (creates tables if missing), then start.
startCommand = "npx prisma db push --accept-data-loss && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
